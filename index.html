<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMPOAII-A Property Owners Association</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="/css/home.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="inner">
    <a href="/" class="site-logo">
      <div class="logo-mark">🏡</div>
      <div class="logo-text">
        <div class="logo-name" id="hdr-name">MMPOAII-A POA</div>
        <div class="logo-sub">Community Portal</div>
      </div>
    </a>
    <nav class="site-nav">
      <a href="/login.html?area=homeowners" class="btn btn-hero-primary">Homeowner Login</a>
      <a href="/login.html?area=board" class="btn btn-hero-secondary">Board Login</a>
    </nav>
  </div>
</header>

<!-- CAROUSEL -->
<section class="carousel">
  <div class="carousel-container">
    <div class="carousel-slide active">
      <img src="/images/image01.png" alt="Community Image 1">
    </div>
    <div class="carousel-slide">
      <img src="/images/image02.png" alt="Community Image 2">
    </div>
    <div class="carousel-slide">
      <img src="/images/image03.png" alt="Community Image 3">
    </div>
    <div class="carousel-slide">
      <img src="/images/image04.png" alt="Community Image 4">
    </div>
    <div class="carousel-slide">
      <img src="/images/image05.png" alt="Community Image 5">
    </div>
    <div class="carousel-slide">
      <img src="/images/image06.png" alt="Community Image 6">
    </div>
  </div>
  <button class="carousel-btn prev">&#10094;</button>
  <button class="carousel-btn next">&#10095;</button>
  <div class="carousel-dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</section>

<!-- HERO CONTENT -->
<section class="hero" style="padding-top: 5px; padding-bottom: 0%;">
  <div class="hero-content" style="padding: 10px;">

    <h2 id="hero-tagline">Building Community. Protecting Your Home.</h2>

    <p style="font-size: 0.5em;">
    This portal is for community members only.  
    </p>

  </div>
</section>


<!-- SCRIPTS -->
<script src="/js/config.js"></script>
<script>
// Populate dynamic content from config
document.addEventListener('DOMContentLoaded', function () {
  const c = typeof HOA_CONFIG !== 'undefined' ? HOA_CONFIG : {};
  const name = c.hoaName || 'MMPOAII HOA';

  document.getElementById('hdr-name').textContent = name;
  document.getElementById('hero-name').textContent = 'Welcome to ' + name;
  document.getElementById('hero-tagline').textContent = c.hoaTagline || 'Your community portal for board resources and homeowner information.';
  document.getElementById('inf-name').textContent = name;
  document.getElementById('inf-city').textContent = c.hoaCity || '';
  document.getElementById('inf-addr').textContent = c.hoaSubdivision || '';
  document.getElementById('inf-phone').textContent = c.hoaPhone || '';
  document.getElementById('foot-name').textContent = name;
  document.getElementById('foot-city').textContent = c.hoaCity || '';

  const emailEls = document.querySelectorAll('#inf-email, #foot-email');
  emailEls.forEach(function (el) {
    el.textContent = c.hoaEmail || 'board@mmpoaii.com';
    el.href = 'mailto:' + (c.hoaEmail || 'board@mmpoaii.com');
  });

  // Announcements
  const bar = document.getElementById('announcements-bar');
  const list = document.getElementById('announcements-list');
  const announcements = (c.announcements || []).filter(function (a) { return a.active; });
  if (announcements.length === 0) {
    bar.style.display = 'none';
  } else {
    const icons = { info: 'ℹ️', warning: '⚠️', success: '✅' };
    list.innerHTML = announcements.map(function (a) {
      return '<div class="announce-item ' + (a.type || 'info') + '">' +
        '<div class="announce-icon">' + (icons[a.type] || 'ℹ️') + '</div>' +
        '<div class="announce-body">' +
          '<div class="title">' + a.title + '</div>' +
          '<div class="text">' + a.body + '</div>' +
        '</div></div>';
    }).join('');
  }

  document.title = name + ' — Community Portal';
});
</script>
<script src="/js/home.js"></script>
</body>
</html>
