AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  MMPOA II-A — Existing infrastructure as code.
  This template documents all AWS resources that were created manually via the console.
  It can be used to recreate the environment from scratch or to import existing resources.

  WARNING: Deploying this template will CREATE NEW resources, not adopt the existing ones.
  To import existing resources into CloudFormation, use `aws cloudformation import`.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ════════════════════════════════════════════════════════════════════════
  # COGNITO — User Pool, Client, Groups
  # ════════════════════════════════════════════════════════════════════════

  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    Properties:
      UserPoolName: mmpoaii-hoa-users
      DeletionProtection: ACTIVE
      MfaConfiguration: "OFF"

      # Admin-only user creation (no self-signup)
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailMessage: "Your MMPOAII portal username is {username} and temporary password is {####}"
          EmailSubject: "MMPOAII Portal — Your temporary password"

      # Password policy
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7

      # Username: sign in with email or phone
      UsernameAttributes:
        - email
        - phone_number
      UsernameConfiguration:
        CaseSensitive: false

      # Auto-verify email and phone
      AutoVerifiedAttributes:
        - email
        - phone_number

      # Required attributes
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: phone_number
          AttributeDataType: String
          Mutable: true
          Required: true
        - Name: address
          AttributeDataType: String
          Mutable: true
          Required: true

      # Account recovery
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
          - Name: verified_phone_number
            Priority: 2

      # Email via Cognito default
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT

  # App Client
  WebClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: mmpoaii-web-client-v2
      UserPoolId: !Ref UserPool
      GenerateSecret: false

      # Token validity
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 5
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days

      # Auth flows
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_AUTH
        - ALLOW_USER_SRP_AUTH

      # OAuth
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - phone
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - https://d84l1y8p4kdic.cloudfront.net

      PreventUserExistenceErrors: ENABLED

  # Cognito groups
  BoardGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: board
      UserPoolId: !Ref UserPool
      Description: Board of Directors
      Precedence: 1

  HomeownersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: homeowners
      UserPoolId: !Ref UserPool
      Description: MMPOAII Homeowners
      Precedence: 2

  # ════════════════════════════════════════════════════════════════════════
  # S3 — Document Storage
  # ════════════════════════════════════════════════════════════════════════

  DocumentBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: hoa-documents-mmpoaii

      # Versioning: disabled (no output from get-bucket-versioning)

      # Server-side encryption: AES-256 with bucket key
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true

      # CORS: allow GET/PUT/DELETE/HEAD from mmpoaii.org
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - DELETE
              - HEAD
            AllowedOrigins:
              - https://mmpoaii.org
            ExposedHeaders:
              - ETag
            MaxAge: 3000

      # Public access block: all disabled (bucket is publicly readable)
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false

  # Bucket policy: public read access
  DocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt DocumentBucket.Arn
              - !Sub "${DocumentBucket.Arn}/*"

  # ════════════════════════════════════════════════════════════════════════
  # LAMBDA — Document Upload (presigned URL generator)
  # ════════════════════════════════════════════════════════════════════════

  DocumentUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hoa-document-upload
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: existing-lambdas/hoa-document-upload/
      Timeout: 3
      MemorySize: 128
      Architectures:
        - x86_64
      Environment:
        Variables:
          BUCKET_NAME: !Ref DocumentBucket
          BOARD_GROUP: board
          ALLOWED_ORIGIN: https://mmpoaii.org
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DocumentBucket

  # ════════════════════════════════════════════════════════════════════════
  # API GATEWAY (HTTP API v2) — Document Upload API
  # ════════════════════════════════════════════════════════════════════════

  DocumentApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: hoa-document-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowCredentials: false
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - POST
          - DELETE
          - OPTIONS
        AllowOrigins:
          - https://mmpoaii.org
        MaxAge: 300

  DocumentApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref DocumentApi
      AuthorizerType: JWT
      IdentitySource: $request.header.Authorization
      Name: cognito-authorizer
      JwtConfiguration:
        Audience:
          - !Ref WebClient
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  DocumentApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref DocumentApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt DocumentUploadFunction.Arn
      IntegrationMethod: POST
      PayloadFormatVersion: "2.0"

  DocumentApiUploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DocumentApi
      RouteKey: "POST /upload-url"
      AuthorizationType: JWT
      AuthorizerId: !Ref DocumentApiAuthorizer
      Target: !Sub "integrations/${DocumentApiIntegration}"

  DocumentApiDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DocumentApi
      RouteKey: "DELETE /delete"
      AuthorizationType: JWT
      AuthorizerId: !Ref DocumentApiAuthorizer
      Target: !Sub "integrations/${DocumentApiIntegration}"

  DocumentApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref DocumentApi
      StageName: $default
      AutoDeploy: true

  DocumentApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DocumentUploadFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DocumentApi}/*/*"

  # ════════════════════════════════════════════════════════════════════════
  # LAMBDA — Account Balance Report
  # ════════════════════════════════════════════════════════════════════════

  AccountBalanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoaii-account-balance-report
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: existing-lambdas/mmpoaii-account-balance-report/
      Timeout: 30
      MemorySize: 128
      Architectures:
        - x86_64
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'

  # ════════════════════════════════════════════════════════════════════════
  # API GATEWAY (REST) — Financial Reports API
  # ════════════════════════════════════════════════════════════════════════

  FinancialApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: mmpoaii-financial-reports-api
      StageName: prod
      Description: Call to get HomeOwner Account Balance report
      EndpointConfiguration:
        Type: REGIONAL
      Cors:
        AllowMethods: "'GET,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  FinancialApiGetRoute:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoaii-account-balance-report-api
      Runtime: nodejs20.x
      Handler: index.handler
      CodeUri: existing-lambdas/mmpoaii-account-balance-report/
      Timeout: 30
      MemorySize: 128
      Events:
        GetBalance:
          Type: Api
          Properties:
            RestApiId: !Ref FinancialApi
            Path: /financial/account-balance
            Method: GET
            # Note: the existing API has NO authorizer on this route
            Auth:
              Authorizer: NONE

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref WebClient

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn

  DocumentApiUrl:
    Description: Document upload HTTP API endpoint
    Value: !GetAtt DocumentApi.ApiEndpoint

  FinancialApiUrl:
    Description: Financial reports REST API endpoint
    Value: !Sub "https://${FinancialApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  DocumentBucketName:
    Description: S3 bucket for HOA documents
    Value: !Ref DocumentBucket
