AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MMPOA Document Review System — API Gateway, Lambda, DynamoDB, Cognito Groups

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  CognitoUserPoolId:
    Type: String
    Default: us-east-1_tfk0ub8lC
    Description: Existing Cognito User Pool ID

  CognitoUserPoolArn:
    Type: String
    Default: arn:aws:cognito-idp:us-east-1:378944200967:userpool/us-east-1_tfk0ub8lC
    Description: ARN of the existing Cognito User Pool

  StageName:
    Type: String
    Default: prod
    Description: API Gateway deployment stage name

  SeedBucketName:
    Type: String
    Default: mmpoa-review-seeds
    Description: S3 bucket for seed JSON files (created outside this stack or set to existing bucket)

  OwnerReportsBucketName:
    Type: String
    Default: mmpoa-owner-reports
    Description: S3 bucket holding owner balance report PDFs (created outside this stack)

# ---------------------------------------------------------------------------
# Globals — shared Lambda config
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        TABLE_NAME: !Ref ReviewTable
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        SEED_BUCKET: !Ref SeedBucketName
        OWNER_REPORTS_BUCKET: !Ref OwnerReportsBucketName
        ALLOWED_ORIGIN: 'https://mmpoaii.org'

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── DynamoDB Table ────────────────────────────────────────────────────────
  ReviewTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: mmpoa-reviews
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── Cognito Groups ───────────────────────────────────────────────────────
  ReviewersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: reviewers
      UserPoolId: !Ref CognitoUserPoolId
      Description: Document review committee members

  ReviewAdminsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: review-admins
      UserPoolId: !Ref CognitoUserPoolId
      Description: Document review administrators

  # ── API Gateway ──────────────────────────────────────────────────────────
  ReviewApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: mmpoa-review-api
      StageName: !Ref StageName
      Cors:
        AllowMethods: "'GET,PUT,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn

  # ── Lambda Functions ─────────────────────────────────────────────────────

  # GET /cycles
  CyclesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-cycles-list
      Handler: cycles-list.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles
            Method: GET

  # POST /cycles
  CycleCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-cycle-create
      Handler: cycle-create.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles
            Method: POST

  # DELETE /cycles/{cycleId}
  CycleDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-cycle-delete
      Handler: cycle-delete.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}
            Method: DELETE

  # PUT /cycles/{cycleId}/threshold
  CycleThresholdFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-cycle-threshold
      Handler: cycle-threshold.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/threshold
            Method: PUT

  # POST /cycles/{cycleId}/seed
  CycleSeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-cycle-seed
      Handler: cycle-seed.handler
      CodeUri: lambdas/
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
        - S3ReadPolicy:
            BucketName: !Ref SeedBucketName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/seed
            Method: POST

  # GET /cycles/{cycleId}/articles
  ArticlesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-articles-list
      Handler: articles-list.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/articles
            Method: GET

  # GET /cycles/{cycleId}/articles/{articleId}
  ArticleDetailFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-article-detail
      Handler: article-detail.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/articles/{articleId}
            Method: GET

  # GET /cycles/{cycleId}/articles/{articleId}/comments
  ArticleCommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-article-comments
      Handler: article-comments.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/articles/{articleId}/comments
            Method: GET

  # PUT /cycles/{cycleId}/votes/{sectionId}
  VoteSaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-vote-save
      Handler: vote-save.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/votes/{sectionId}
            Method: PUT

  # POST /cycles/{cycleId}/submit
  BallotSubmitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-ballot-submit
      Handler: ballot-submit.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/submit
            Method: POST

  # GET /cycles/{cycleId}/aggregate
  AggregateGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-aggregate-get
      Handler: aggregate-get.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/aggregate
            Method: GET

  # GET /cycles/{cycleId}/summary
  SummaryGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-summary-get
      Handler: summary-get.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/summary
            Method: GET

  # PUT /cycles/{cycleId}/summary/{sectionId}
  SummarySaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-summary-save
      Handler: summary-save.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/summary/{sectionId}
            Method: PUT

  # POST /cycles/{cycleId}/doctext
  DocTextSaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-doctext-save
      Handler: doctext-save.handler
      CodeUri: lambdas/
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
        - S3ReadPolicy:
            BucketName: !Ref SeedBucketName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/doctext
            Method: POST

  # GET /cycles/{cycleId}/doctext/{sectionId}
  DocTextGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-doctext-get
      Handler: doctext-get.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/doctext/{sectionId}
            Method: GET

  # PUT /cycles/{cycleId}/status
  CycleCloseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-cycle-close
      Handler: cycle-close.handler
      CodeUri: lambdas/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ReviewTable
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /cycles/{cycleId}/status
            Method: PUT

  # GET /seeds
  SeedsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-review-seeds-list
      Handler: seeds-list.handler
      CodeUri: lambdas/
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref SeedBucketName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /seeds
            Method: GET

  # GET /owner-report — returns pre-signed S3 URL to caller's most recent balance PDF
  OwnerReportGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: mmpoa-owner-report-get
      Handler: owner-report-get.handler
      CodeUri: lambdas/
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref OwnerReportsBucketName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref ReviewApi
            Path: /owner-report
            Method: GET

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: Review API base URL
    Value: !Sub "https://${ReviewApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

  TableName:
    Description: DynamoDB table name
    Value: !Ref ReviewTable

  ReviewersGroupName:
    Description: Cognito group for reviewers
    Value: !Ref ReviewersGroup

  ReviewAdminsGroupName:
    Description: Cognito group for review admins
    Value: !Ref ReviewAdminsGroup
