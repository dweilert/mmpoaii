<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Review — MMPOAII</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="/css/review.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="site-logo">
      <div class="logo-mark">🏡</div>
      <div class="logo-text">
        <div class="logo-name" data-hoa-name>MMPOAII HOA</div>
        <div class="logo-sub">Document Review</div>
      </div>
    </a>
    <nav class="site-nav">
      <a href="#" id="back-link">← Back to Articles</a>
      <div class="nav-user">
        <div class="avatar" id="nav-avatar">?</div>
        <div>
          <div class="uname" data-user-name>Loading…</div>
          <div class="urole" data-user-role></div>
        </div>
      </div>
      <button class="logout-btn" onclick="HoaGuard.logout()">Sign Out</button>
    </nav>
  </div>
</header>

<div id="page-content">
<div class="review-wrap">

  <div class="article-header">
    <div style="margin-bottom:8px;">
      <a href="#" id="back-to-articles" style="font-size:14px;color:var(--purple-800);text-decoration:none;font-weight:600;">← Back to Articles</a>
    </div>
    <div class="ah-nav" id="art-nav">
      <a href="#" id="prev-link" style="display:none;">← Previous Article</a>
      <span style="flex:1"></span>
      <a href="#" id="next-link" style="display:none;">Next Article →</a>
    </div>
    <h2 id="article-title">Loading…</h2>
    <p id="article-progress" style="font-size:13px;color:var(--text3);margin-top:4px;"></p>
    <div id="approve-all-bar" style="display:none;margin-top:12px;">
      <button class="btn-primary" onclick="approveAllSections()" id="approve-all-btn" style="background:var(--green-600);">Approve All Sections</button>
      <span id="approve-all-status" style="margin-left:12px;font-size:13px;color:var(--text3);"></span>
    </div>
  </div>

  <div id="sections-container">
    <div class="empty-state">
      <div class="es-icon">⏳</div>
      <div class="es-text">Loading sections…</div>
    </div>
  </div>

  <div id="nav-bottom" class="ah-nav" style="margin-top:24px;display:none;">
    <a href="#" id="prev-link-bottom">← Previous Article</a>
    <span style="flex:1"></span>
    <a href="#" id="next-link-bottom">Next Article →</a>
  </div>
  <div style="margin-top:16px;text-align:center;">
    <a href="#" id="back-to-articles-bottom" style="font-size:14px;color:var(--purple-800);text-decoration:none;font-weight:600;">← Back to Articles</a>
  </div>

</div>
</div>

<footer class="site-footer">
  <div data-hoa-name>MMPOAII HOA</div>
  <div>Document Review System — Confidential</div>
</footer>

<!-- Document Text Modal -->
<div id="doctext-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);overflow-y:auto;" onclick="if(event.target===this)closeDocTextModal()">
  <div style="max-width:720px;margin:40px auto;background:#fff;border-radius:var(--r2);box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;">
    <div style="background:var(--purple-800);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div id="modal-title" style="font-family:var(--serif);font-size:17px;font-weight:700;"></div>
        <div id="modal-subtitle" style="font-size:13px;opacity:.7;margin-top:2px;"></div>
      </div>
      <button onclick="closeDocTextModal()" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>
    </div>
    <div id="modal-body" style="padding:24px;font-size:18px;line-height:1.75;color:var(--text);white-space:pre-wrap;font-family:var(--serif);"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/review-api.js"></script>
<script>
HoaGuard.protect('reviewers');

var params = new URLSearchParams(window.location.search);
var cycleId = params.get('cycleId');
var articleId = params.get('articleId');

if (!cycleId || !articleId) {
  window.location.href = '/review/index.html';
}

// Set back links
var articlesUrl = '/review/articles.html?cycleId=' + encodeURIComponent(cycleId);
document.getElementById('back-link').href = articlesUrl;
document.getElementById('back-to-articles').href = articlesUrl;
document.getElementById('back-to-articles-bottom').href = articlesUrl;

// Debounce timers for notes autosave
var noteTimers = {};

// Classification labels
var classLabels = {
  required_by_law: 'Required by Texas Law',
  required_by_city: 'Required by City of Austin',
  best_practice: 'Recommended Best Practice',
  community_choice: 'Community Choice'
};

async function loadArticle() {
  try {
    var data = await ReviewApi.getArticle(cycleId, articleId);
    var artNum = parseInt(articleId, 10);

    document.getElementById('article-title').textContent =
      'Article ' + data.articleNumber + ' — ' + data.articleTitle;

    var voted = 0;
    var total = data.sections.length;
    data.sections.forEach(function (s) { if (s.myVote && s.myVote.vote) voted++; });
    document.getElementById('article-progress').textContent =
      voted + ' of ' + total + ' sections voted in this article';

    document.title = 'Art. ' + data.articleNumber + ' — ' + data.articleTitle + ' — Review';

    // Nav links
    setupNav(artNum);

    // Render sections
    var html = '<div class="section-list">';
    for (var i = 0; i < data.sections.length; i++) {
      var s = data.sections[i];
      var secId = 'ART-' + pad(artNum) + '#SEC-' + pad(s.sectionNumber);
      var cls = s.classification || 'best_practice';
      var currentVote = (s.myVote && s.myVote.vote) || '';
      var currentNotes = (s.myVote && s.myVote.notes) || '';

      html += '<div class="section-card" id="sec-' + s.sectionNumber + '">';

      // Header
      html += '<div class="sc-header">';
      html += '<div class="sc-title-group" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">';
      html += '<div>';
      html += '<div class="sc-title">Art. ' + artNum + ', §' + s.sectionNumber + ' — ' + escHtml(s.sectionTitle) + '</div>';
      html += '<span class="sc-classification cls-' + cls + '">' + escHtml(classLabels[cls] || cls) + '</span>';
      html += '</div>';
      var voteStatusLabel = 'Waiting for Vote';
      var voteStatusColor = '#888';
      var voteStatusBg = '#f0f0f0';
      if (currentVote === 'approve') { voteStatusLabel = 'Approved'; voteStatusColor = '#1e7e34'; voteStatusBg = '#e6f4ea'; }
      else if (currentVote === 'disapprove') { voteStatusLabel = 'Disapproved'; voteStatusColor = '#b71c1c'; voteStatusBg = '#fde8e8'; }
      else if (currentVote === 'discuss') { voteStatusLabel = 'Discuss'; voteStatusColor = '#7a6100'; voteStatusBg = '#fff8e1'; }
      html += '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">';
      html += '<span id="vote-status-' + secId + '" style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:12px;background:' + voteStatusBg + ';color:' + voteStatusColor + ';">' + voteStatusLabel + '</span>';
      html += '<button onclick="showDocText(\'' + secId + '\', ' + artNum + ', \'' + escHtml(s.sectionTitle).replace(/'/g, "\\'") + '\', ' + s.sectionNumber + ')" style="white-space:nowrap;padding:6px 14px;font-size:13px;border:1px solid var(--purple-600);color:var(--purple-700);background:#fff;border-radius:var(--r1);cursor:pointer;font-weight:600;">View Text</button>';
      html += '</div>';
      html += '</div></div>';

      // Body
      html += '<div class="sc-body">';

      html += '<div class="sc-field">';
      html += '<div class="sc-label">Why It\'s Here</div>';
      html += '<div class="sc-text">' + escHtml(s.whyItsHere) + '</div>';
      html += '</div>';

      html += '<div class="sc-field">';
      html += '<div class="sc-label">What You Can Do</div>';
      html += '<div class="sc-text">' + escHtml(s.whatYouCanDo) + '</div>';
      html += '</div>';

      if (s.communityImpact) {
        html += '<div class="sc-impact">';
        html += '<div class="sc-label">Community Impact</div>';
        html += '<div class="sc-text">' + escHtml(s.communityImpact) + '</div>';
        html += '</div>';
      }

      html += '</div>'; // /sc-body

      // Vote controls
      html += '<div class="vote-controls">';
      html += '<div class="vote-buttons">';
      html += voteButton(secId, 'approve', 'Approve', currentVote);
      html += voteButton(secId, 'disapprove', 'Disapprove', currentVote);
      html += voteButton(secId, 'discuss', 'Discuss', currentVote);
      html += '</div>';
      html += '<textarea class="vote-notes" id="notes-' + secId + '" ' +
              'placeholder="Optional notes or comments…" ' +
              'oninput="onNotesInput(\'' + secId + '\')">' + escHtml(currentNotes) + '</textarea>';
      html += '<div class="save-indicator" id="status-' + secId + '"></div>';
      html += '</div>'; // /vote-controls

      html += '</div>'; // /section-card
    }
    html += '</div>';
    document.getElementById('sections-container').innerHTML = html;
    document.getElementById('nav-bottom').style.display = 'flex';
    document.getElementById('approve-all-bar').style.display = '';

  } catch (err) {
    document.getElementById('sections-container').innerHTML =
      '<div class="alert alert-error">Failed to load article: ' + escHtml(err.message) + '</div>';
  }
}

function voteButton(secId, value, label, currentVote) {
  var selected = currentVote === value ? ' selected' : '';
  return '<button class="vote-btn ' + value + selected + '" ' +
    'data-sec-id="' + secId + '" ' +
    'onclick="onVoteClick(\'' + secId + '\', \'' + value + '\', this)">' +
    label + '</button>';
}

function setupNav(artNum) {
  // We know CC&Rs have articles 1-14, but let's just do prev/next based on artNum
  var base = '/review/article.html?cycleId=' + encodeURIComponent(cycleId) + '&articleId=';

  if (artNum > 1) {
    document.getElementById('prev-link').href = base + (artNum - 1);
    document.getElementById('prev-link').style.display = '';
    document.getElementById('prev-link-bottom').href = base + (artNum - 1);
  } else {
    document.getElementById('prev-link').style.display = 'none';
    document.getElementById('prev-link-bottom').style.display = 'none';
  }

  // Always show next (it'll 404 gracefully if there's no next article)
  document.getElementById('next-link').href = base + (artNum + 1);
  document.getElementById('next-link').style.display = '';
  document.getElementById('next-link-bottom').href = base + (artNum + 1);
}

// ── Vote click handler (immediate save) ──
async function onVoteClick(secId, vote, btn) {
  // Update button states
  var buttons = btn.parentElement.querySelectorAll('.vote-btn');
  buttons.forEach(function (b) { b.classList.remove('selected'); });
  btn.classList.add('selected');

  // Update vote status badge
  var statusEl = document.getElementById('vote-status-' + secId);
  if (statusEl) {
    var labels = { approve: 'Approved', disapprove: 'Disapproved', discuss: 'Discuss' };
    var colors = { approve: '#1e7e34', disapprove: '#b71c1c', discuss: '#7a6100' };
    var bgs = { approve: '#e6f4ea', disapprove: '#fde8e8', discuss: '#fff8e1' };
    statusEl.textContent = labels[vote] || vote;
    statusEl.style.color = colors[vote] || '#888';
    statusEl.style.background = bgs[vote] || '#f0f0f0';
  }

  // Get current notes
  var notesEl = document.getElementById('notes-' + secId);
  var notes = notesEl ? notesEl.value : undefined;

  setStatus(secId, 'saving', 'Saving…');
  try {
    await ReviewApi.saveVote(cycleId, secId, vote, notes);
    setStatus(secId, 'saved', 'Saved ✓');
  } catch (err) {
    setStatus(secId, 'error', 'Save failed: ' + err.message);
  }
}

// ── Notes input handler (debounced 500ms) ──
function onNotesInput(secId) {
  if (noteTimers[secId]) clearTimeout(noteTimers[secId]);

  setStatus(secId, 'saving', 'Typing…');

  noteTimers[secId] = setTimeout(async function () {
    var notesEl = document.getElementById('notes-' + secId);
    var notes = notesEl ? notesEl.value : '';

    // Find current vote
    var container = notesEl.closest('.vote-controls');
    var selectedBtn = container.querySelector('.vote-btn.selected');
    var vote = selectedBtn ? selectedBtn.textContent.trim().toLowerCase() : undefined;

    setStatus(secId, 'saving', 'Saving notes…');
    try {
      await ReviewApi.saveVote(cycleId, secId, vote, notes);
      setStatus(secId, 'saved', 'Saved ✓');
    } catch (err) {
      setStatus(secId, 'error', 'Save failed: ' + err.message);
    }
  }, 500);
}

function setStatus(secId, cls, text) {
  var el = document.getElementById('status-' + secId);
  if (el) {
    el.className = 'save-indicator ' + cls;
    el.textContent = text;
  }
}

function pad(n) { return String(n).padStart(2, '0'); }

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── Document Text Modal ──
async function showDocText(secId, artNum, sectionTitle, sectionNumber) {
  var modal = document.getElementById('doctext-modal');
  document.getElementById('modal-title').textContent = 'Art. ' + artNum + ', §' + sectionNumber + ' — ' + sectionTitle;
  document.getElementById('modal-subtitle').textContent = 'Original Document Text';
  document.getElementById('modal-body').textContent = 'Loading…';
  modal.style.display = '';
  document.body.style.overflow = 'hidden';

  try {
    var data = await ReviewApi.getDocText(cycleId, secId);
    document.getElementById('modal-body').textContent = data.text;
  } catch (err) {
    if (err.status === 404) {
      document.getElementById('modal-body').textContent = 'Document text not available for this section.\n\nAn administrator needs to upload the document text via the Admin Console.';
    } else {
      document.getElementById('modal-body').textContent = 'Failed to load: ' + err.message;
    }
  }
}

function closeDocTextModal() {
  document.getElementById('doctext-modal').style.display = 'none';
  document.body.style.overflow = '';
}

// Close modal on Escape key
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') closeDocTextModal();
});

// ── Approve All Sections ──
async function approveAllSections() {
  var btn = document.getElementById('approve-all-btn');
  var status = document.getElementById('approve-all-status');
  btn.disabled = true;
  btn.textContent = 'Approving…';
  status.textContent = '';

  // Find all section cards that don't already have "approve" selected
  var cards = document.querySelectorAll('.section-card');
  var toApprove = [];
  cards.forEach(function (card) {
    var approveBtn = card.querySelector('.vote-btn.approve');
    if (approveBtn && !approveBtn.classList.contains('selected')) {
      toApprove.push({ card: card, btn: approveBtn });
    }
  });

  if (toApprove.length === 0) {
    status.textContent = 'All sections already approved.';
    btn.disabled = false;
    btn.textContent = 'Approve All Sections';
    return;
  }

  var saved = 0;
  var failed = 0;

  for (var i = 0; i < toApprove.length; i++) {
    var item = toApprove[i];
    // Select the approve button visually
    var allBtns = item.card.querySelectorAll('.vote-btn');
    allBtns.forEach(function (b) { b.classList.remove('selected'); });
    item.btn.classList.add('selected');

    // Get secId from data attribute
    var secId = item.btn.dataset.secId;
    if (!secId) { failed++; continue; }

    // Get notes if any
    var notesEl = document.getElementById('notes-' + secId);
    var notes = notesEl ? notesEl.value : undefined;

    status.textContent = 'Saving ' + (i + 1) + ' of ' + toApprove.length + '…';

    try {
      await ReviewApi.saveVote(cycleId, secId, 'approve', notes);
      setStatus(secId, 'saved', 'Saved ✓');
      var voteStatusEl = document.getElementById('vote-status-' + secId);
      if (voteStatusEl) { voteStatusEl.textContent = 'Approved'; voteStatusEl.style.color = '#1e7e34'; voteStatusEl.style.background = '#e6f4ea'; }
      saved++;
    } catch (err) {
      setStatus(secId, 'error', 'Save failed');
      failed++;
    }
  }

  btn.disabled = false;
  btn.textContent = 'Approve All Sections';
  if (failed === 0) {
    status.textContent = 'Approved ' + saved + ' sections ✓';
  } else {
    status.textContent = 'Approved ' + saved + ', failed ' + failed;
  }

  // Update progress text
  var totalCards = document.querySelectorAll('.section-card').length;
  var votedCards = document.querySelectorAll('.vote-btn.selected').length;
  // Each card has 3 vote buttons, count cards with any selected
  var votedCount = 0;
  document.querySelectorAll('.section-card').forEach(function (c) {
    if (c.querySelector('.vote-btn.selected')) votedCount++;
  });
  document.getElementById('article-progress').textContent =
    votedCount + ' of ' + totalCards + ' sections voted in this article';
}

var guardCheck = setInterval(function () {
  if (HoaGuard.getUser()) {
    clearInterval(guardCheck);
    loadArticle();
    var uname = document.querySelector('[data-user-name]');
    if (uname && uname.textContent !== 'Loading…') {
      document.getElementById('nav-avatar').textContent = uname.textContent.charAt(0).toUpperCase();
    }
  }
}, 100);

setTimeout(function () {
  var container = document.getElementById('sections-container');
  if (container && container.querySelector('.es-icon')) {
    container.innerHTML = '<div class="alert alert-error">Loading timed out. Please refresh the page or check your connection.</div>';
  }
}, 30000);
</script>
</body>
</html>
