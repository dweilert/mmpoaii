<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Review — MMPOAII</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="/css/review.css">
</head>
<body>

<header class="site-header">
  <div class="inner">
    <a href="/" class="site-logo">
      <div class="logo-mark">🏡</div>
      <div class="logo-text">
        <div class="logo-name" data-hoa-name>MMPOAII HOA</div>
        <div class="logo-sub">Document Review</div>
      </div>
    </a>
    <nav class="site-nav">
      <a href="#" id="back-link">← Back to Articles</a>
      <div class="nav-user">
        <div class="avatar" id="nav-avatar">?</div>
        <div>
          <div class="uname" data-user-name>Loading…</div>
          <div class="urole" data-user-role></div>
        </div>
      </div>
      <button class="logout-btn" onclick="HoaGuard.logout()">Sign Out</button>
    </nav>
  </div>
</header>

<div id="page-content">
<div class="review-wrap">

  <div style="margin-bottom:8px;">
    <a href="#" id="back-to-articles" style="font-size:14px;color:var(--purple-800);text-decoration:none;font-weight:600;">← Back to Articles</a>
  </div>

  <div class="article-header">
    <h2 id="article-title" style="margin:0 0 8px;">Loading…</h2>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div id="approve-all-bar" style="display:none;align-items:center;gap:10px;flex-shrink:0;">
        <button class="btn-primary" onclick="approveAllSections()" id="approve-all-btn" style="background:#e6f4ea;color:#1e7e34;border:1px solid #a8d5b8;padding:8px 18px;font-size:13px;">Approve All Sections</button>
        <button id="reading-mode-btn" onclick="toggleReadingMode()" style="padding:8px 18px;font-size:13px;font-weight:600;border:1px solid #bbb;color:#555;background:#fafafa;border-radius:var(--r);cursor:pointer;">Just the Facts</button>
        <button id="hide-approved-btn" onclick="toggleHideApproved()" style="padding:8px 18px;font-size:13px;font-weight:600;border:1px solid #bbb;color:#555;background:#fafafa;border-radius:var(--r);cursor:pointer;">Hide Approved</button>
        <button id="font-size-btn" onclick="cycleFontSize()" style="padding:8px 14px;font-size:13px;font-weight:700;border:1px solid #bbb;color:#555;background:#fafafa;border-radius:var(--r);cursor:pointer;" title="Increase text size for easier reading">A+ Text Size</button>
        <span id="approve-all-status" style="font-size:13px;color:var(--text3);"></span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-left:auto;">
        <p id="article-progress" style="font-size:13px;color:var(--text3);margin:0;white-space:nowrap;"></p>
        <div class="ah-nav" id="art-nav" style="margin:0;gap:16px;">
          <a href="#" id="prev-link" style="display:none;">← Previous</a>
          <a href="#" id="next-link" style="display:none;">Next →</a>
        </div>
      </div>
    </div>
  </div>

  <div id="sections-container">
    <div class="empty-state">
      <div class="es-icon">⏳</div>
      <div class="es-text">Loading sections…</div>
    </div>
  </div>

  <div id="nav-bottom" class="ah-nav" style="margin-top:24px;display:none;">
    <a href="#" id="prev-link-bottom">← Previous Article</a>
    <span style="flex:1"></span>
    <a href="#" id="next-link-bottom">Next Article →</a>
  </div>
  <div style="margin-top:16px;text-align:center;">
    <a href="#" id="back-to-articles-bottom" style="font-size:14px;color:var(--purple-800);text-decoration:none;font-weight:600;">← Back to Articles</a>
  </div>

</div>
</div>

<footer class="site-footer">
  <div data-hoa-name>MMPOAII HOA</div>
  <div>Document Review System — Confidential</div>
</footer>

<!-- Approve All Progress Modal -->
<div id="approve-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);overflow-y:auto;">
  <div style="max-width:520px;margin:80px auto;background:#fff;border-radius:var(--r2);box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;">
    <div style="background:var(--green-600);color:#fff;padding:16px 24px;">
      <div style="font-family:var(--serif);font-size:17px;font-weight:700;">Approve All Sections</div>
    </div>
    <div style="padding:20px 24px;">
      <div id="approve-modal-progress" style="font-size:14px;color:var(--text);margin-bottom:12px;">Preparing…</div>
      <div style="background:var(--gray-100);border-radius:4px;height:8px;overflow:hidden;margin-bottom:16px;">
        <div id="approve-modal-bar" style="height:100%;width:0%;background:var(--green-600);border-radius:4px;transition:width .2s;"></div>
      </div>
      <div id="approve-modal-log" style="max-height:200px;overflow-y:auto;font-size:13px;line-height:1.6;border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;background:var(--surf2);"></div>
      <div id="approve-modal-summary" style="display:none;margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:14px;font-weight:600;"></div>
      <div style="text-align:right;margin-top:16px;">
        <button id="approve-modal-close" class="btn-primary" onclick="closeApproveModal()" style="display:none;">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Key Questions Modal -->
<div id="kq-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);overflow-y:auto;" onclick="if(event.target===this)closeKqModal()">
  <div style="max-width:640px;margin:60px auto;background:#fff;border-radius:var(--r2);box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;">
    <div id="kq-modal-header" style="color:#fff;padding:16px 24px;display:flex;align-items:flex-start;justify-content:space-between;">
      <div>
        <div id="kq-modal-title" style="font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700;"></div>
        <div id="kq-modal-category" style="margin-top:8px;"></div>
        <div id="kq-modal-subtitle" style="font-size:13px;opacity:.85;margin-top:4px;"></div>
      </div>
      <button onclick="closeKqModal()" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>
    </div>
    <div id="kq-modal-body" style="padding:24px;font-size:16px;line-height:1.7;color:var(--text);font-family:Arial,Helvetica,sans-serif;"></div>
  </div>
</div>

<!-- Document Text Modal -->
<div id="doctext-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);overflow-y:auto;" onclick="if(event.target===this)closeDocTextModal()">
  <div style="max-width:720px;margin:40px auto;background:#fff;border-radius:var(--r2);box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden;">
    <div style="background:var(--purple-800);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div id="modal-title" style="font-family:Arial,Helvetica,sans-serif;font-size:17px;font-weight:700;"></div>
        <div id="modal-subtitle" style="font-size:13px;opacity:.7;margin-top:2px;"></div>
      </div>
      <button onclick="closeDocTextModal()" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>
    </div>
    <div id="modal-body" style="padding:24px;font-size:18px;line-height:1.75;color:var(--text);white-space:pre-wrap;font-family:Arial,Helvetica,sans-serif;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/review-api.js"></script>
<script>
HoaGuard.protect('reviewers');

var params = new URLSearchParams(window.location.search);
var cycleId = params.get('cycleId');
var articleId = params.get('articleId');

if (!cycleId || !articleId) {
  window.location.href = '/review/index.html';
}

// Set back links
var articlesUrl = '/review/articles.html?cycleId=' + encodeURIComponent(cycleId);
document.getElementById('back-link').href = articlesUrl;
document.getElementById('back-to-articles').href = articlesUrl;
document.getElementById('back-to-articles-bottom').href = articlesUrl;

// Debounce timers for notes autosave
var noteTimers = {};

// Classification labels
var classLabels = {
  required_by_law: 'Required by Texas Law',
  required_by_city: 'Required by City of Austin',
  best_practice: 'Recommended Best Practice',
  community_choice: 'Community Choice'
};

// Key Questions per classification (from MMPOA Key Questions V2)
var keyQuestions = {
  required_by_law: [
    'Is the legal citation correct? Verify that the Texas Property Code section referenced actually requires what the provision says. Laws change \u2014 confirm the reference is current.',
    'Does the language match the statute? Some provisions paraphrase the law. Check that the paraphrase is accurate and doesn\u2019t accidentally weaken or overstate the legal requirement.',
    'Are the timelines compliant? Texas law specifies minimum notice periods (e.g., 30 days for lien notice). Confirm our documents meet or exceed \u2014 never fall below \u2014 statutory minimums.',
    'Is this implemented correctly elsewhere? A required provision may depend on procedures in the Bylaws or Rules. Verify the cross-references work and the procedures are actually in place.',
    'Are there any gaps? Texas Property Code Chapter 209 has many requirements. If you notice something the law requires that isn\u2019t addressed in our documents, flag it.'
  ],
  required_by_city: [
    'Is the legal citation correct? Verify that the City of Austin ordinance referenced actually requires what the provision says. Laws change \u2014 confirm the reference is current.',
    'Does the language match the statute? Some provisions paraphrase the law. Check that the paraphrase is accurate and doesn\u2019t accidentally weaken or overstate the legal requirement.',
    'Are the timelines compliant? City ordinances may specify minimum notice periods. Confirm our documents meet or exceed \u2014 never fall below \u2014 statutory minimums.',
    'Is this implemented correctly elsewhere? A required provision may depend on procedures in the Bylaws or Rules. Verify the cross-references work and the procedures are actually in place.',
    'Are there any gaps? If you notice something the City of Austin requires that isn\u2019t addressed in our documents, flag it.'
  ],
  best_practice: [
    'What risk does this provision reduce? The Field Guide explains the risk for each recommended provision. Before voting to remove one, make sure you understand what could go wrong without it.',
    'Do other Texas HOAs include this? If a provision is standard across well-managed HOAs, there\u2019s usually a good reason. Removing something everyone else keeps should require strong justification.',
    'Can we adjust it instead of removing it? Many provisions have tunable values (dollar thresholds, time periods, percentages). You may be able to keep the protection while adjusting the specifics to fit our community.',
    'What\u2019s the financial exposure? Some best practices protect against lawsuits, special assessments, or uninsured losses. Ask: what\u2019s the worst-case cost if we remove this provision?',
    'Does our community have a history here? If the community has experienced problems in an area (e.g., delinquent assessments, contractor disputes), keeping the related best practice is especially important.'
  ],
  community_choice: [
    'Does this reflect how we actually live? Community choice provisions should match reality. If a rule is routinely ignored, it may need to be updated, relaxed, or better enforced \u2014 not just left on paper.',
    'Is this the right threshold or limit? Many community choices involve specific numbers: fine amounts, pet limits, parking rules, noise hours. Ask whether the current values are reasonable and enforceable.',
    'Would this affect property values? Some provisions (exterior standards, short-term rental restrictions) directly affect home values. Consider whether a change helps or hurts the neighborhood\u2019s appeal.',
    'Is this enforceable and fair? A rule that can\u2019t be enforced consistently is worse than no rule. Consider whether the Board can realistically monitor and enforce what\u2019s written.',
    'What do the neighbors think? Community choice means community input. If you feel strongly about a provision, talk to your neighbors. The final vote will reflect the majority\u2019s preferences.'
  ]
};

// Short document type labels
var docTypeLabels = {
  'CC&Rs': 'CC&Rs',
  'Bylaws': 'Bylaws',
  'Rules of Conduct': 'Rules'
};

async function loadArticle() {
  try {
    var data = await ReviewApi.getArticle(cycleId, articleId);
    var artNum = parseInt(articleId, 10);

    // Fetch document type from cycle metadata
    var docPrefix = '';
    try {
      var cyclesData = await ReviewApi.listCycles();
      var cycle = (cyclesData.cycles || []).find(function (c) { return c.cycleId === cycleId; });
      if (cycle && cycle.document) {
        docPrefix = (docTypeLabels[cycle.document] || cycle.document) + ' — ';
      }
    } catch (e) { /* non-critical, skip */ }

    document.getElementById('article-title').textContent =
      docPrefix + 'Article ' + data.articleNumber + ' — ' + data.articleTitle;

    var voted = 0;
    var total = data.sections.length;
    data.sections.forEach(function (s) { if (s.myVote && s.myVote.vote) voted++; });
    document.getElementById('article-progress').textContent =
      voted + ' of ' + total + ' sections voted in this article';

    document.title = 'Art. ' + data.articleNumber + ' — ' + data.articleTitle + ' — Review';

    // Nav links
    setupNav(artNum);

    // Render sections
    var html = '<div class="section-list">';
    for (var i = 0; i < data.sections.length; i++) {
      var s = data.sections[i];
      var secId = 'ART-' + pad(artNum) + '#SEC-' + pad(s.sectionNumber);
      var cls = s.classification || 'best_practice';
      var currentVote = (s.myVote && s.myVote.vote) || '';
      var currentNotes = ''; // comments append to list; always start empty

      html += '<div class="section-card" id="sec-' + s.sectionNumber + '">';

      // Header — line 1: title + vote status, line 2: category left, buttons right
      var voteStatusLabel = 'Waiting for Vote';
      var voteStatusColor = '#888';
      var voteStatusBg = '#f0f0f0';
      if (currentVote === 'approve') { voteStatusLabel = 'Approved'; voteStatusColor = '#1e7e34'; voteStatusBg = '#e6f4ea'; }
      else if (currentVote === 'disapprove') { voteStatusLabel = 'Disapproved'; voteStatusColor = '#b71c1c'; voteStatusBg = '#fde8e8'; }
      else if (currentVote === 'discuss') { voteStatusLabel = 'Discuss'; voteStatusColor = '#7a6100'; voteStatusBg = '#fff8e1'; }

      html += '<div class="sc-header">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">';
      html += '<div class="sc-title" style="margin:0;min-width:0;overflow:hidden;text-overflow:ellipsis;">Art. ' + artNum + ', §' + s.sectionNumber + ' — ' + escHtml(s.sectionTitle) + '</div>';
      html += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">';
      html += '<span id="vote-status-' + secId + '" style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;background:' + voteStatusBg + ';color:' + voteStatusColor + ';white-space:nowrap;">' + voteStatusLabel + '</span>';
      html += '<button class="vote-btn-sm approve' + (currentVote === 'approve' ? ' selected' : '') + '" data-sec-id="' + secId + '" data-vote="approve" onclick="onVoteClick(\'' + secId + '\', \'approve\', this)" title="Approve">✓</button>';
      html += '<button class="vote-btn-sm disapprove' + (currentVote === 'disapprove' ? ' selected' : '') + '" data-sec-id="' + secId + '" data-vote="disapprove" onclick="onVoteClick(\'' + secId + '\', \'disapprove\', this)" title="Disapprove">✗</button>';
      html += '<button class="vote-btn-sm discuss' + (currentVote === 'discuss' ? ' selected' : '') + '" data-sec-id="' + secId + '" data-vote="discuss" onclick="onVoteClick(\'' + secId + '\', \'discuss\', this)" title="Discuss">?</button>';
      html += '</div>';
      html += '</div>';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:6px;">';
      // Left side: classification badge + impact indicator
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">';
      html += '<span class="sc-classification cls-' + cls + '">' + escHtml(classLabels[cls] || cls) + '</span>';
      if (s.communityImpact) {
        html += '<span title="This section has Community Impact notes — click View Field Notes to read them" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;background:#FFF3E0;color:#E65100;font-size:11px;font-weight:700;cursor:help;flex-shrink:0;border:1px solid #FFE0B2;letter-spacing:.2px;"><span style="font-size:14px;line-height:1;">&#9733;</span> Impact</span>';
      }
      html += '</div>';
      // Right side: View Key Questions, View Field Notes
      html += '<div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">';
      html += '<button onclick="showKeyQuestions(\'' + cls + '\')" style="white-space:nowrap;padding:7px 16px;font-size:13px;border:1px solid #bbb;color:#555;background:#fafafa;border-radius:var(--r);cursor:pointer;font-weight:600;">View Key Questions</button>';
      html += '<button onclick="showFieldNotes(\'' + secId + '\', ' + artNum + ', \'' + escHtml(s.sectionTitle).replace(/'/g, "\\'") + '\', ' + s.sectionNumber + ')" style="white-space:nowrap;padding:7px 16px;font-size:13px;border:1px solid #bbb;color:#555;background:#fafafa;border-radius:var(--r);cursor:pointer;font-weight:600;">View Field Notes</button>';
      html += '</div>';
      html += '</div></div>';

      // Store field guide data for the modal
      sectionFieldData[secId] = {
        whyItsHere: s.whyItsHere,
        whatYouCanDo: s.whatYouCanDo,
        communityImpact: s.communityImpact,
        classification: s.classification
      };

      // Body — show governing document text (loaded async)
      html += '<div class="sc-body">';
      html += '<div class="sc-field">';
      html += '<div class="sc-label doctext-label">Governing Document Text</div>';
      html += '<div class="sc-text" id="doctext-' + secId + '" style="white-space:pre-wrap;font-family:var(--serif);font-size:16px;line-height:1.7;color:var(--text2);">Loading document text…</div>';
      html += '</div>';
      html += '</div>'; // /sc-body

      // Comment area (vote buttons are all on the title line now)
      html += '<div class="vote-controls">';
      html += '<textarea class="vote-notes" id="notes-' + secId + '" ' +
              'placeholder="Type your comment here…" rows="2">' + escHtml(currentNotes) + '</textarea>';
      html += '<div style="display:flex;align-items:center;gap:10px;margin-top:4px;">';
      html += '<button class="submit-comment-btn" onclick="submitComment(\'' + secId + '\')" ' +
              'style="padding:6px 16px;font-size:12px;font-weight:600;background:#4285f4;color:#fff;border:none;border-radius:6px;cursor:pointer;">Submit Comment</button>';
      html += '<span style="font-size:11px;color:var(--text3);">Press to post your comment to the discussion</span>';
      html += '<span class="save-indicator" id="status-' + secId + '" style="margin-left:auto;"></span>';
      html += '</div>';
      html += '</div>'; // /vote-controls

      // Reviewer Comments panel
      html += '<div class="reviewer-comments" id="comments-' + secId + '" style="margin-top:0;">';
      html += '<div class="rc-header" id="rc-header-' + secId + '" onclick="toggleComments(\'' + secId + '\')" ' +
              'style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 14px;' +
              'background:#eef2f7;border:1px solid #d0d7e0;border-radius:6px;transition:background .2s;">';
      html += '<span class="rc-toggle" id="rc-toggle-' + secId + '" style="font-size:10px;color:#5a6a7a;transition:transform .2s;">&#9654;</span>';
      html += '<span style="font-size:12px;font-weight:700;color:#5a6a7a;text-transform:uppercase;letter-spacing:.5px;">Reviewer Comments</span>';
      html += '<span class="rc-count" id="rc-count-' + secId + '" style="font-size:13px;font-weight:700;color:#5a6a7a;"></span>';
      html += '</div>';
      html += '<div class="rc-body" id="rc-body-' + secId + '" style="display:none;max-height:300px;overflow-y:auto;padding:4px 0 0;"></div>';
      html += '<div class="rc-scroll-hint" id="rc-scroll-hint-' + secId + '" style="display:none;text-align:right;padding:2px 12px 4px;font-size:11px;color:#888;background:#eef2f7;border:1px solid #d0d7e0;border-top:none;border-radius:0 0 6px 6px;">&#8597; Scroll for more comments</div>';
      html += '</div>'; // /reviewer-comments

      html += '</div>'; // /section-card
    }
    html += '</div>';
    document.getElementById('sections-container').innerHTML = html;
    document.getElementById('nav-bottom').style.display = 'flex';
    document.getElementById('approve-all-bar').style.display = 'flex';

    // Fetch governing document text — 3 at a time to avoid overwhelming the API
    var secIds = data.sections.map(function (s) {
      return 'ART-' + pad(artNum) + '#SEC-' + pad(s.sectionNumber);
    });
    loadDocTextBatch(secIds, 0);

    // Load other reviewers' comments + start polling
    loadReviewerComments(artNum);
    startCommentPolling(artNum);

  } catch (err) {
    document.getElementById('sections-container').innerHTML =
      '<div class="alert alert-error">Failed to load article: ' + escHtml(err.message) + '</div>';
  }
}

function voteButton(secId, value, label, currentVote) {
  var selected = currentVote === value ? ' selected' : '';
  return '<button class="vote-btn ' + value + selected + '" ' +
    'data-sec-id="' + secId + '" data-vote="' + value + '" ' +
    'onclick="onVoteClick(\'' + secId + '\', \'' + value + '\', this)">' +
    label + '</button>';
}

function setupNav(artNum) {
  // We know CC&Rs have articles 1-14, but let's just do prev/next based on artNum
  var base = '/review/article.html?cycleId=' + encodeURIComponent(cycleId) + '&articleId=';

  if (artNum > 1) {
    document.getElementById('prev-link').href = base + (artNum - 1);
    document.getElementById('prev-link').style.display = '';
    document.getElementById('prev-link-bottom').href = base + (artNum - 1);
  } else {
    document.getElementById('prev-link').style.display = 'none';
    document.getElementById('prev-link-bottom').style.display = 'none';
  }

  // Always show next (it'll 404 gracefully if there's no next article)
  document.getElementById('next-link').href = base + (artNum + 1);
  document.getElementById('next-link').style.display = '';
  document.getElementById('next-link-bottom').href = base + (artNum + 1);
}

// ── Vote click handler (immediate save) ──
async function onVoteClick(secId, vote, btn) {
  // Update all vote buttons (both full-size and compact) for this section
  var allBtns = document.querySelectorAll('[data-sec-id="' + secId + '"]');
  allBtns.forEach(function (b) { b.classList.remove('selected'); });
  allBtns.forEach(function (b) {
    if (b.dataset.vote === vote) b.classList.add('selected');
  });

  // Update vote status badge
  var statusEl = document.getElementById('vote-status-' + secId);
  if (statusEl) {
    var labels = { approve: 'Approved', disapprove: 'Disapproved', discuss: 'Discuss' };
    var colors = { approve: '#1e7e34', disapprove: '#b71c1c', discuss: '#7a6100' };
    var bgs = { approve: '#e6f4ea', disapprove: '#fde8e8', discuss: '#fff8e1' };
    statusEl.textContent = labels[vote] || vote;
    statusEl.style.color = colors[vote] || '#888';
    statusEl.style.background = bgs[vote] || '#f0f0f0';
  }

  // Get current notes
  var notesEl = document.getElementById('notes-' + secId);
  var notes = notesEl ? notesEl.value : undefined;

  setStatus(secId, 'saving', 'Saving…');
  try {
    var result = await ReviewApi.saveVote(cycleId, secId, vote, notes);
    var ts = result.updatedAt ? ' — ' + formatTimestamp(result.updatedAt) : '';
    setStatus(secId, 'saved', 'Saved ✓' + ts);
    updateProgressCount();
    // Refresh comments panel so others see latest
    refreshSectionComments(secId);
  } catch (err) {
    setStatus(secId, 'error', 'Save failed: ' + err.message);
  }
}

function updateProgressCount() {
  var votedCount = 0;
  document.querySelectorAll('.section-card').forEach(function (c) {

// ── Notes input handler (debounced 500ms) ──
function onNotesInput(secId) {
  if (noteTimers[secId]) clearTimeout(noteTimers[secId]);

  setStatus(secId, 'saving', 'Typing…');

  noteTimers[secId] = setTimeout(async function () {
    var notesEl = document.getElementById('notes-' + secId);
    if (!notesEl) return;
    var notes = notesEl.value;

    // Find current vote from any button (compact or full-size) in this section card
    var card = notesEl.closest('.section-card');
    var selectedBtn = card ? (card.querySelector('.vote-btn-sm.selected') || card.querySelector('.vote-btn.selected')) : null;
    var vote = selectedBtn ? selectedBtn.dataset.vote : undefined;

    setStatus(secId, 'saving', 'Saving notes…');
    try {
      var result = await ReviewApi.saveVote(cycleId, secId, vote, notes);
      var ts = result.updatedAt ? ' — ' + formatTimestamp(result.updatedAt) : '';
      setStatus(secId, 'saved', 'Saved ✓' + ts);
    } catch (err) {
      setStatus(secId, 'error', 'Save failed: ' + err.message);
    }
  }, 500);
}

// ── Submit Comment (explicit post + clear) ──
async function submitComment(secId) {
  var notesEl = document.getElementById('notes-' + secId);
  if (!notesEl) return;
  var notes = notesEl.value.trim();
  if (!notes) {
    setStatus(secId, 'error', 'Type a comment before submitting.');
    return;
  }

  // Cancel any pending autosave
  if (noteTimers[secId]) clearTimeout(noteTimers[secId]);

  // Find current vote (does not auto-set discuss — reviewer must choose)
  var card = notesEl.closest('.section-card');
  var selectedBtn = card ? (card.querySelector('.vote-btn-sm.selected') || card.querySelector('.vote-btn.selected')) : null;
  var vote = selectedBtn ? selectedBtn.dataset.vote : undefined;

  setStatus(secId, 'saving', 'Posting comment…');
  try {
    var result = await ReviewApi.saveVote(cycleId, secId, vote, notes);
    var ts = result.updatedAt ? ' — ' + formatTimestamp(result.updatedAt) : '';
    setStatus(secId, 'saved', 'Comment posted ✓' + ts);
    // Clear the textarea
    notesEl.value = '';
    updateProgressCount();
    // Refresh comments panel to show the new comment
    refreshSectionComments(secId);
    // Auto-expand the comments panel so they see their post
    var bodyEl = document.getElementById('rc-body-' + secId);
    var toggleEl = document.getElementById('rc-toggle-' + secId);
    if (bodyEl && bodyEl.style.display === 'none') {
      bodyEl.style.display = 'block';
      if (toggleEl) toggleEl.style.transform = 'rotate(90deg)';
    }
  } catch (err) {
    setStatus(secId, 'error', 'Post failed: ' + err.message);
  }
}

function formatTimestamp(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var mo = months[d.getMonth()];
  var day = d.getDate();
  var h = d.getHours();
  var m = String(d.getMinutes()).padStart(2, '0');
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return mo + ' ' + day + ' at ' + h + ':' + m + ' ' + ampm;
}

async function loadReviewerComments(artNum) {
  try {
    var result = await ReviewApi.getArticleComments(cycleId, artNum);
    var comments = result.comments || {};
    // Update each section's comment panel
    Object.keys(comments).forEach(function (secKey) {
      renderComments(secKey, comments[secKey]);
    });
    // Sections with no comments get styled as empty
    document.querySelectorAll('.reviewer-comments').forEach(function (panel) {
      var secId = panel.id.replace('comments-', '');
      if (!comments[secId]) {
        renderComments(secId, []);
      }
    });
  } catch (err) {
    console.warn('Could not load reviewer comments:', err.message);
  }
}

function renderComments(secId, entries) {
  var countEl = document.getElementById('rc-count-' + secId);
  var bodyEl = document.getElementById('rc-body-' + secId);
  if (!countEl || !bodyEl) return;

  countEl.textContent = '(' + entries.length + ')';

  // Detect new comments since last render
  var prevCount = prevCommentCounts[secId] || 0;
  var isNew = entries.length > prevCount && prevCount > 0;
  prevCommentCounts[secId] = entries.length;

  // Show or update the NEW indicator
  var newEl = document.getElementById('rc-new-' + secId);
  if (!newEl) {
    // Create indicator span once — inserted after count element
    newEl = document.createElement('span');
    newEl.id = 'rc-new-' + secId;
    newEl.style.cssText = 'font-size:11px;font-weight:700;color:#e53935;margin-left:6px;transition:opacity .5s;';
    countEl.parentNode.insertBefore(newEl, countEl.nextSibling);
  }
  if (isNew) {
    var diff = entries.length - prevCount;
    newEl.textContent = diff === 1 ? '● NEW comment' : '● ' + diff + ' NEW comments';
    newEl.style.opacity = '1';
    // Fade out after 8 seconds
    clearTimeout(newEl._fadeTimer);
    newEl._fadeTimer = setTimeout(function () { newEl.style.opacity = '0'; }, 8000);
  }

  // Style the banner — muted when empty, bright count badge when comments exist
  var headerEl = document.getElementById('rc-header-' + secId);
  if (headerEl) {
    // Banner always stays neutral/muted
    headerEl.style.background = '#eef2f7';
    headerEl.style.borderColor = '#d0d7e0';
    headerEl.style.borderLeft = '1px solid #d0d7e0';

    if (entries.length > 0) {
      // Bright badge draws the eye
      countEl.style.background = '#e53935';
      countEl.style.color = '#fff';
      countEl.style.padding = '1px 8px';
      countEl.style.borderRadius = '10px';
      countEl.style.fontSize = '13px';
      countEl.style.fontWeight = '700';
    } else {
      countEl.style.background = '';
      countEl.style.color = '#5a6a7a';
      countEl.style.padding = '';
      countEl.style.borderRadius = '';
      countEl.style.fontWeight = '';
    }
  }

  if (entries.length === 0) {
    bodyEl.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 0;">No comments yet.</div>';
    return;
  }

  var html = '';
  entries.forEach(function (c, idx) {
    var voteBadge = '';
    if (c.vote) {
      var voteColors = { approve: '#1e7e34', disapprove: '#b71c1c', discuss: '#7a6100' };
      var voteBgs = { approve: '#e6f4ea', disapprove: '#fde8e8', discuss: '#fff8e1' };
      var voteLabels = { approve: 'Approve', disapprove: 'Disapprove', discuss: 'Discuss' };
      voteBadge = '<span style="display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px;' +
        'background:' + (voteBgs[c.vote] || '#f0f0f0') + ';color:' + (voteColors[c.vote] || '#888') + ';">' +
        (voteLabels[c.vote] || c.vote) + '</span>';
    }
    var ts = c.updatedAt ? '<span style="font-size:11px;color:var(--text3);">' + formatTimestamp(c.updatedAt) + '</span>' : '';
    var rowBg = (idx % 2 === 0) ? 'var(--surf)' : '#f0f4f8';

    html += '<div style="padding:8px 10px;border-left:3px solid var(--border);margin:4px 0;background:' + rowBg + ';border-radius:0 6px 6px 0;">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:' + (c.notes ? '4px' : '0') + ';">';
    var youTag = c.isYou ? ' <span style="font-size:10px;font-weight:400;color:var(--text3);">(You)</span>' : '';
    html += '<span style="font-size:12px;font-weight:600;color:var(--text);">' + escHtml(c.displayName) + youTag + '</span>';
    html += voteBadge;
    html += '<span style="flex:1;"></span>';
    html += ts;
    html += '</div>';
    if (c.notes) {
      html += '<div style="font-size:13px;color:var(--text2);line-height:1.4;white-space:pre-wrap;">' + escHtml(c.notes) + '</div>';
    }
    html += '</div>';
  });

  bodyEl.innerHTML = html;
}

// ── Load document text with auto-retry and batching ──
var DOC_TEXT_BATCH_SIZE = 3;   // concurrent requests at a time
var DOC_TEXT_MAX_RETRIES = 2;  // auto-retry up to 2 times before showing button

// Process secIds in batches of DOC_TEXT_BATCH_SIZE
function loadDocTextBatch(secIds, startIdx) {
  if (startIdx >= secIds.length) return;
  var batch = secIds.slice(startIdx, startIdx + DOC_TEXT_BATCH_SIZE);
  var promises = batch.map(function (secId) { return loadDocText(secId, 0); });
  Promise.all(promises).then(function () {
    loadDocTextBatch(secIds, startIdx + DOC_TEXT_BATCH_SIZE);
  });
}

// Load a single section's doc text with auto-retry
function loadDocText(secId, attempt) {
  if (attempt === undefined) attempt = 0;
  var el = document.getElementById('doctext-' + secId);
  if (!el) return Promise.resolve();

  el.textContent = attempt > 0 ? 'Retrying\u2026 (attempt ' + (attempt + 1) + ')' : 'Loading document text\u2026';
  el.style.color = 'var(--text2)';
  el.style.fontStyle = 'normal';
  // Remove any existing retry button
  var existing = document.getElementById('retry-' + secId);
  if (existing) existing.remove();

  return ReviewApi.getDocText(cycleId, secId).then(function (d) {
    el.textContent = d.text;
    el.style.color = 'var(--text)';
  }).catch(function (err) {
    if (err.status === 404) {
      el.textContent = 'Document text not yet available for this section.';
      el.style.color = 'var(--text3)';
      el.style.fontStyle = 'italic';
      return;
    }
    // Auto-retry if we haven't exhausted attempts
    if (attempt < DOC_TEXT_MAX_RETRIES) {
      var delay = (attempt + 1) * 1500; // 1.5s, 3s
      return new Promise(function (resolve) {
        setTimeout(function () { resolve(loadDocText(secId, attempt + 1)); }, delay);
      });
    }
    // All retries exhausted — show error with manual retry button
    el.textContent = 'Could not load document text after ' + (DOC_TEXT_MAX_RETRIES + 1) + ' attempts.';
    el.style.color = '#b71c1c';
    var btn = document.createElement('button');
    btn.id = 'retry-' + secId;
    btn.textContent = 'Retry Loading';
    btn.style.cssText = 'display:block;margin-top:12px;padding:8px 20px;font-size:14px;font-weight:700;color:#fff;background:#b71c1c;border:none;border-radius:6px;cursor:pointer;';
    btn.onclick = function () { loadDocText(secId, 0); };
    el.parentElement.appendChild(btn);
  });
}

async function saveVoteWithRetry(cycleId, secId, vote, notes) {
  try {
    await ReviewApi.saveVote(cycleId, secId, vote, notes);
    return { ok: true };
  } catch (err) {
    // Retry once for network/timeout errors
    var retryable = err.message && (
      err.message.indexOf('timed out') >= 0 ||
      err.message.indexOf('Failed to fetch') >= 0 ||
      err.message.indexOf('NetworkError') >= 0 ||
      err.message.indexOf('network') >= 0 ||
      (err.status && err.status >= 500)
    );
    if (retryable) {
      await new Promise(function (r) { setTimeout(r, 1000); });
      try {
        await ReviewApi.saveVote(cycleId, secId, vote, notes);
        return { ok: true, retried: true };
      } catch (err2) {
        return { ok: false, error: err2.message || 'Unknown error', retried: true };
      }
    }
    return { ok: false, error: err.message || 'Unknown error', retried: false };
  }
}

async function approveAllSections() {
  var btn = document.getElementById('approve-all-btn');
  btn.disabled = true;
  btn.textContent = 'Approving…';

  // Find sections to approve
  var cards = document.querySelectorAll('.section-card');
  var toApprove = [];
  cards.forEach(function (card) {
    var approveBtn = card.querySelector('.vote-btn-sm.approve');
    if (approveBtn && !approveBtn.classList.contains('selected')) {
      toApprove.push({ card: card, btn: approveBtn });
    }
  });

  if (toApprove.length === 0) {
    document.getElementById('approve-all-status').textContent = 'All sections already approved.';
    btn.disabled = false;
    btn.textContent = 'Approve All Sections';
    return;
  }

  // Open modal
  var modal = document.getElementById('approve-modal');
  var progressEl = document.getElementById('approve-modal-progress');
  var barEl = document.getElementById('approve-modal-bar');
  var logEl = document.getElementById('approve-modal-log');
  var summaryEl = document.getElementById('approve-modal-summary');
  var closeBtn = document.getElementById('approve-modal-close');

  modal.style.display = '';
  closeBtn.style.display = 'none';
  summaryEl.style.display = 'none';
  logEl.innerHTML = '';
  barEl.style.width = '0%';
  progressEl.textContent = 'Approving ' + toApprove.length + ' sections…';

  var saved = 0;
  var failed = 0;
  var failedSections = [];

  for (var i = 0; i < toApprove.length; i++) {
    var item = toApprove[i];
    var secId = item.btn.dataset.secId;
    if (!secId) {
      failed++;
      appendLog('Section ' + (i + 1) + ': Missing section ID — skipped', '#b71c1c');
      continue;
    }

    // Get section label for the log
    var titleEl = item.card.querySelector('.sc-title');
    var secLabel = titleEl ? titleEl.textContent : secId;

    var notesEl = document.getElementById('notes-' + secId);
    var notes = notesEl ? notesEl.value : undefined;

    progressEl.textContent = 'Saving ' + (i + 1) + ' of ' + toApprove.length + '…';
    barEl.style.width = Math.round(((i + 1) / toApprove.length) * 100) + '%';

    var result = await saveVoteWithRetry(cycleId, secId, 'approve', notes);

    if (result.ok) {
      // Update UI — sync all vote buttons (compact + full) for this section
      var allBtns = document.querySelectorAll('[data-sec-id="' + secId + '"]');
      allBtns.forEach(function (b) { b.classList.remove('selected'); });
      allBtns.forEach(function (b) { if (b.dataset.vote === 'approve') b.classList.add('selected'); });
      setStatus(secId, 'saved', 'Saved ✓');
      var voteStatusEl = document.getElementById('vote-status-' + secId);
      if (voteStatusEl) { voteStatusEl.textContent = 'Approved'; voteStatusEl.style.color = '#1e7e34'; voteStatusEl.style.background = '#e6f4ea'; }
      saved++;
      var retryNote = result.retried ? ' (succeeded on retry)' : '';
      appendLog('✓ ' + secLabel + retryNote, '#1e7e34');
    } else {
      setStatus(secId, 'error', 'Save failed');
      failed++;
      failedSections.push(secLabel);
      var retryNote2 = result.retried ? ' (failed after retry)' : '';
      appendLog('✗ ' + secLabel + ' — ' + result.error + retryNote2, '#b71c1c');
    }
  }

  // Show summary
  barEl.style.width = '100%';
  if (failed === 0) {
    progressEl.textContent = 'Complete — all ' + saved + ' sections approved.';
    summaryEl.style.display = '';
    summaryEl.style.background = '#e6f4ea';
    summaryEl.style.color = '#1e7e34';
    summaryEl.textContent = 'All ' + saved + ' sections approved successfully.';
    barEl.style.background = 'var(--green-600)';
  } else {
    progressEl.textContent = 'Complete — ' + saved + ' approved, ' + failed + ' failed.';
    summaryEl.style.display = '';
    summaryEl.style.background = '#fde8e8';
    summaryEl.style.color = '#b71c1c';
    summaryEl.innerHTML = '<div>' + failed + ' section(s) failed to save. Please scroll down to find each section listed below and vote on it individually:</div>' +
      '<ul style="margin:6px 0 0;padding-left:18px;font-weight:400;font-size:13px;">' +
      failedSections.map(function (s) { return '<li>' + escHtml(s) + '</li>'; }).join('') +
      '</ul>';
    barEl.style.background = '#b71c1c';
  }

  closeBtn.style.display = '';
  btn.disabled = false;
  btn.textContent = 'Approve All Sections';
  document.getElementById('approve-all-status').textContent = '';

  // Update progress text
  updateProgressCount();
}

var guardCheck = setInterval(function () {
  if (HoaGuard.getUser()) {
    clearInterval(guardCheck);
    loadArticle();
    var uname = document.querySelector('[data-user-name]');
    if (uname && uname.textContent !== 'Loading…') {
      document.getElementById('nav-avatar').textContent = uname.textContent.charAt(0).toUpperCase();
    }
  }
}, 100);

setTimeout(function () {
  var container = document.getElementById('sections-container');
  if (container && container.querySelector('.es-icon')) {
    container.innerHTML = '<div class="alert alert-error">Loading timed out. Please refresh the page or check your connection.</div>';
  }
}, 30000);
</script>
